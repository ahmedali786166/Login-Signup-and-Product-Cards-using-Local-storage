<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | CarStore</title>
    <link rel="stylesheet" href="style.css">
    <script>
        
        if(!localStorage.getItem('currentUser')) window.location.href = 'index.html';
    </script>
</head>
<body onload="initDashboard()">
    <nav class="navbar">
        <div class="logo">Car<span>Store</span></div>
        <input type="text" id="searchBar" placeholder="Search car parts..." oninput="handleSearch()">
        <div class="user-nav">
            <span id="welcomeMsg">Welcome</span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <section class="products-section">
            <h3>Available Products</h3>
            <div id="productGrid" class="product-grid"></div>
        </section>

        <section class="cart-section">
            <h3>Your Shopping Cart</h3>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-footer">
                <p>Total Items: <span id="cartCount">0</span></p>
                <h4>Total: Rs. <span id="totalPrice">0</span></h4>
            </div>
        </section>
    </div>

    <script src="products.js"></script>
</body>
</html>
